<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Check Temperature, Humidity & Wind Speed Worldwide</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Free weather app. Check temperature, humidity, and wind speed for any city in the world instantly.">
    
    <meta property="og:title" content="Weather App - Check Weather Worldwide">
    
    <meta property="og:description" content="Simple JavaScript weather app showing temperature, humidity and wind speed for any city.">
    <meta property="og:type" content="website">

    <meta name="robots" content="index, follow">
    
    <link rel="icon" href="/images/rain.png">
</head>
<body>
<h1>Weather App</h1>
<div class="card">

    <div class="search">

        <input type="text" placeholder="enter city name" spellcheck="false">

        <button><img src="/images/search.png" alt="Search Icon"></button>

    </div>

    <div class="error">
        <p>Invalid City Name</p>
    </div>

    <div class="weather">

        <img src="/images/rain.png" class="weatherIcon" alt="Weather Condition">
        <h1 class="temp">22°c</h1>
        <h2 class="city">New York</h2>

        <div class="details">

            <div class="col">

                <img src="/images/humidity.png" alt="Humidity Icon"> 
                
                <div>

                    <p class="humidity">50%</p>

                    <p>Humidity</p>

                </div>

            </div>

            <div class="col">

                <img src="/images/wind.png">

                <div>

                    <p class="wind">15 km/h</p>

                    <p>Wind Speed</p>

                </div>

            </div>

            
        </div>


    </div>


</div>

<script>
    const apiKey = "7fa59031a5d8b6da45eb65759de951e8"
    const apiUrl = "https://api.openweathermap.org/data/2.5/weather?&units=metric&q="

    const searchBox = document.querySelector('.search input');
    const searchBtn = document.querySelector('.search button');
    const weather_icon = document.querySelector('.weatherIcon');

    

    async function checkWeather(city) {
        const response = await fetch(apiUrl + city + `&appid=${apiKey}`)
        
        if (response.status == 404) {
            document.querySelector('.error').style.display = 'block'
            document.querySelector('.weather').style.display = "none";
        } else {

            var data = await response.json()
            document.querySelector('.city').innerHTML = data.name;
            
            document.querySelector('.temp').innerHTML = Math.round(data.main.temp) + '°c';

            document.querySelector('.humidity').innerHTML = data.main.humidity + '%'; 

            document.querySelector('.wind').innerHTML = data.wind.speed + ' km/h';
            if (data.weather[0].main == "Clouds") {
                weather_icon.src = "/images/clouds.png"
            } else if (data.weather[0].main == "Clear") {
                weather_icon.src = "/images/clear.png"
            } else if (data.weather[0].main == "Rain") {
                weather_icon.src = "/images/rain.png"
            } else if (data.weather[0].main == "Drizzle") {
                weather_icon.src = "/images/drizzle.png"
            } else if (data.weather[0].main == "Mist") {
                weather_icon.src = "/images/mist.png"
            }
            document.querySelector('.weather').style.display = "block";
            document.querySelector('.error').style.display = 'none';

        }



    };

    searchBtn.addEventListener('click', ()=>{
        checkWeather(searchBox.value)
    })

    
</script>
</body>

</html>
